[project]
name = "plcc"
dynamic = ["version"]
description = "Programming Languages Compiler Compiler"
authors = [
    {name = "PLCC Community", email = "https://discord.gg/EVtNSxS9E2"},
]
dependencies = [
    "docopt-ng>=0.9.0"
]
requires-python = ">=3.10"
readme = "README.md"
license = {text = "GPL-3.0-or-later"}


[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"


[tool.pdm]
distribution = true


[tool.pdm.build]
package-dir = "src"

[tool.pdm.version]
source = "scm"


[project.scripts]
plcc-spec = "plcc.spec.plcc_spec_cli:main"
plcc-tokens = "plcc.tokens.tokens_cli:main"

[tool.pdm.scripts]
test = "pytest -qq -rfEsxXP --cov=plcc --cov-branch --cov-report term-missing:skip-covered"
ctest = "pytest-watch --runner \"bin/test/units.bash\""

[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "pyfakefs>=5.4.1",
    "pytest-cov>=5.0.0",
    "pytest-watch>=4.2.0",
    "check-jsonschema>=0.29.0",
]
