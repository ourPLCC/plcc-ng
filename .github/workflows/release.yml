name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to republish (e.g. v0.64.4). Leave empty for a normal release."
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  semantic-release:
    name: Semantic release
    if: inputs.tag == ''
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          push: "true"
          changelog: "true"
          vcs_release: "false"

  publish:
    name: Publish to PyPI
    needs: semantic-release
    if: ${{ !cancelled() && (inputs.tag != '' || needs.semantic-release.outputs.released == 'true') }}
    runs-on: ubuntu-latest
    environment: pypi
    env:
      RELEASE_TAG: ${{ inputs.tag != '' && inputs.tag || format('v{0}', needs.semantic-release.outputs.version) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - name: Verify input is an existing tag
        run: |
          TAG_SHA=$(git rev-parse -q --verify "refs/tags/${RELEASE_TAG}^{commit}") || {
            echo "FAIL: '${RELEASE_TAG}' is not an existing tag"
            exit 1
          }
          if [ "$(git rev-parse HEAD)" != "${TAG_SHA}" ]; then
            echo "FAIL: checked-out ref does not match tag ${RELEASE_TAG} (${TAG_SHA})"
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install PDM
        run: pip install pdm
      - name: Build wheel
        run: bin/build/package.bash

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: false

      - name: Smoke test TestPyPI install
        run: |
          VERSION="${RELEASE_TAG#v}"
          python -m venv /tmp/smoke-venv
          for attempt in $(seq 1 20); do
            if /tmp/smoke-venv/bin/pip install \
                --no-cache-dir \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "plcc-ng==${VERSION}"; then
              break
            fi
            if [ "${attempt}" -eq 20 ]; then
              echo "FAIL: plcc-ng==${VERSION} not installable from TestPyPI after 20 attempts"
              exit 1
            fi
            echo "TestPyPI index not ready (attempt ${attempt}/20); retrying in 15s"
            sleep 15
          done
          SPEC="$(pwd)/tests/fixtures/trivial.plcc"
          WORK=$(mktemp -d)
          cd "${WORK}"
          export PATH="/tmp/smoke-venv/bin:${PATH}"
          plcc-make --spec="${SPEC}"
          test -f plcc-ng/spec.json || { echo "FAIL: plcc-ng/spec.json missing"; exit 1; }
          echo "TestPyPI smoke test passed"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  create-release:
    name: Create GitHub Release
    needs: [semantic-release, publish]
    if: ${{ !cancelled() && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag != '' && inputs.tag || format('v{0}', needs.semantic-release.outputs.version) }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; nothing to do"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
